<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dutch Nouns – Flashcards</title>
<style>
:root{--bg:#f4f7fb;--ink:#1a2b3c;--muted:#5a6b7c;--accent:#2c6aa0;--card:#fff;--border:#c8d8e8;--de:#2c6aa0;--het:#2a7a6a}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:12px;-webkit-tap-highlight-color:transparent}
h1{font-size:1.2rem;color:var(--accent);margin-bottom:10px;letter-spacing:.5px}
#filter-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;justify-content:center}
.filter-btn{padding:8px 16px;border:1.5px solid var(--border);border-radius:20px;background:var(--card);color:var(--muted);cursor:pointer;font-size:.85rem;transition:.2s;touch-action:manipulation;min-height:44px}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
#scene{width:min(420px,96vw);height:260px;perspective:1000px;cursor:pointer;margin-bottom:14px;touch-action:pan-y}
.inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .55s ease}
.inner.flipped{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:12px;background:var(--card);border:1.5px solid var(--border);box-shadow:0 2px 12px rgba(0,0,0,.08);padding:20px 22px;display:flex;flex-direction:column;justify-content:center;user-select:none;-webkit-user-select:none}
.back{transform:rotateY(180deg)}
/* Front */
.card-num{font-size:.75rem;color:var(--muted);margin-bottom:6px}
.front-nl{font-size:2.4rem;font-weight:700;color:var(--accent);margin-bottom:8px;line-height:1.1}
.front-en,.front-fr{font-size:.95rem;color:var(--muted);line-height:1.5}
.flip-hint{margin-top:10px;font-size:.72rem;color:#aab;text-align:center}
/* Back */
.art-badge{display:inline-block;font-size:1.5rem;font-weight:800;padding:3px 14px;border-radius:8px;margin-bottom:8px;color:#fff}
.art-badge.de{background:var(--de)}
.art-badge.het{background:var(--het)}
.back-noun{font-size:1.6rem;font-weight:700;color:var(--ink);margin-bottom:2px}
.back-plural{font-size:.82rem;color:var(--muted);margin-bottom:10px}
.back-sent{font-size:.9rem;line-height:1.5;margin-bottom:4px}
.back-sent strong{color:var(--accent)}
.back-en,.back-fr{font-size:.82rem;color:var(--muted);line-height:1.4}
/* Toolbar */
#toolbar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:10px;width:min(420px,96vw)}
.nav-btn{padding:7px 14px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);color:var(--accent);font-size:.9rem;cursor:pointer;font-weight:600;touch-action:manipulation;min-height:44px}
.nav-btn:hover{background:var(--accent);color:#fff}
#counter{font-size:.88rem;color:var(--muted);min-width:70px;text-align:center}
#goto-input{width:54px;padding:6px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:.85rem;text-align:center}
#search-input{padding:6px 10px;border:1.5px solid var(--border);border-radius:6px;font-size:.85rem;width:120px}
.go-btn{padding:6px 10px;border:1.5px solid var(--accent);border-radius:6px;background:var(--accent);color:#fff;font-size:.82rem;cursor:pointer}
/* Welcome screen */
#welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;padding:20px;text-align:center;width:100%}
.welcome-logo{font-size:4rem;margin-bottom:12px;line-height:1}
.welcome-h1{font-size:1.8rem;color:var(--accent);margin-bottom:6px}
.welcome-sub{color:var(--muted);font-size:.92rem;margin-bottom:32px}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:min(400px,92vw)}
.mode-btn.full{grid-column:1/-1}
.mode-btn{display:flex;flex-direction:column;align-items:center;padding:20px 12px;border:2px solid var(--border);border-radius:14px;background:var(--card);cursor:pointer;transition:.2s;gap:6px;text-align:center;touch-action:manipulation}
.mode-btn:hover,.mode-btn:active{border-color:var(--accent);box-shadow:0 4px 16px rgba(44,106,160,.15);transform:translateY(-2px)}
.mode-icon{font-size:2.4rem;line-height:1}
.mode-title{font-size:.95rem;font-weight:700;color:var(--ink)}
.mode-sub{font-size:.72rem;color:var(--muted)}
/* App wrapper */
#app{display:none;flex-direction:column;align-items:center;padding:12px;width:100%}
.app-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;width:min(420px,96vw)}
#home-btn{padding:5px 12px;border:1.5px solid var(--border);border-radius:20px;background:var(--card);color:var(--muted);font-size:.82rem;cursor:pointer;white-space:nowrap}
#home-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.app-title{font-size:1rem;color:var(--accent);font-weight:700}
/* Emoji on card front */
.front-emoji{font-size:2.2rem;margin-bottom:4px;line-height:1}
.byline{position:fixed;bottom:10px;right:14px;font-size:.65rem;color:var(--muted);opacity:.55;pointer-events:none}
</style>
</head>
<body>
<div id="welcome">
  <div class="welcome-logo">🇳🇱</div>
  <h1 class="welcome-h1">Dutch Flashcards</h1>
  <p class="welcome-sub">Kies een categorie · Choose a category</p>
  <div class="mode-grid">
    <button class="mode-btn" onclick="startNouns()">
      <span class="mode-icon">📖</span>
      <span class="mode-title">Zelfstandige naamwoorden</span>
      <span class="mode-sub">de / het · 500 cards</span>
    </button>
    <button class="mode-btn" onclick="window.location='verbs.html'">
      <span class="mode-icon">🔤</span>
      <span class="mode-title">Werkwoorden</span>
      <span class="mode-sub">Perfectum · Imperfectum · 200 verbs</span>
    </button>
    <button class="mode-btn full" onclick="window.location='sandra21.html'">
      <img src="sandra21-hero.png" alt="Sandra 2.1" style="width:100%;max-height:180px;object-fit:cover;border-radius:10px;margin-bottom:8px;">
      <span class="mode-title">Sandra 2.1</span>
      <span class="mode-sub">Irregular Verbs</span>
    </button>
  </div>
  <p class="byline">by Fatima Lokhandwala</p>
</div>
<div id="app">
<div class="app-header">
  <button id="home-btn" onclick="showWelcome()">← Home</button>
  <span class="app-title">📖 Dutch Nouns</span>
</div>
<div id="filter-bar">
  <button class="filter-btn active" data-f="all">All (500)</button>
  <button class="filter-btn" data-f="de">de-woorden</button>
  <button class="filter-btn" data-f="het">het-woorden</button>
</div>
<div id="toolbar">
  <button class="nav-btn" id="prev-btn">&#9664;</button>
  <span id="counter">1 / 500</span>
  <button class="nav-btn" id="next-btn">&#9654;</button>
  <input id="goto-input" type="number" min="1" placeholder="#">
  <button class="go-btn" id="goto-btn">Go</button>
  <input id="search-input" list="noun-list" placeholder="Search noun…">
  <datalist id="noun-list"></datalist>
  <button class="go-btn" id="search-btn">Find</button>
</div>
<div id="scene">
  <div class="inner" id="inner">
    <div class="face front" id="front"></div>
    <div class="face back"  id="back"></div>
  </div>
</div>
</div><!-- #app -->

// build deck
let deck=[], cur=0, flipped=false;
function buildDeck(filter){
  deck=DUTCH_NOUNS.map((n,i)=>({...n,i,s:SENTS[i]})).filter(n=>filter==='all'||n.article===filter);
  cur=0; flipped=false; render();
}

function highlightEen(t){
  return t.replace(/(een\s+\S+\s+\S+)/,'<strong>$1</strong>');
}

function render(){
  if(!deck.length){
    document.getElementById('front').innerHTML='<p style="color:var(--muted);text-align:center">No cards.</p>';
    document.getElementById('back').innerHTML='';
    document.getElementById('counter').textContent='0 / 0';
    return;
  }
  const n=deck[cur], s=n.s;
  const emoji=EMOJIS[n.i]||'📝';
  const inner=document.getElementById('inner');
  inner.classList.toggle('flipped',flipped);
  // front
  document.getElementById('front').innerHTML=
    `<div class="card-num">#${n.i+1}</div>
     <div class="front-emoji">${emoji}</div>
     <div class="front-nl">${n.nl}</div>
     <div class="front-en">${n.en}</div>
     <div class="front-fr">${n.fr}</div>
     <div class="flip-hint">tap to flip</div>`;
  // back
  const artClass=n.article;
  document.getElementById('back').innerHTML=
    `<span class="art-badge ${artClass}">${n.article}</span>
     <div class="back-noun">${n.article} ${n.nl}</div>
     <div class="back-plural">pl. ${n.plural}</div>
     <div class="back-sent">${highlightEen(s[0])}</div>
     <div class="back-en">${s[1]}</div>
     <div class="back-fr">${s[2]}</div>`;
  document.getElementById('counter').textContent=`${cur+1} / ${deck.length}`;
}

// nav
document.getElementById('prev-btn').onclick=()=>{cur=(cur-1+deck.length)%deck.length;flipped=false;render()};
document.getElementById('next-btn').onclick=()=>{cur=(cur+1)%deck.length;flipped=false;render()};
document.getElementById('scene').onclick=()=>{flipped=!flipped;render()};

// goto
document.getElementById('goto-btn').onclick=()=>{
  const v=parseInt(document.getElementById('goto-input').value);
  const idx=deck.findIndex(n=>n.i+1===v);
  if(idx>=0){cur=idx;flipped=false;render();}
};

// search
const dl=document.getElementById('noun-list');
DUTCH_NOUNS.forEach(n=>{const o=document.createElement('option');o.value=n.nl;dl.appendChild(o);});
document.getElementById('search-btn').onclick=()=>{
  const q=document.getElementById('search-input').value.trim().toLowerCase();
  const idx=deck.findIndex(n=>n.nl.toLowerCase()===q);
  if(idx>=0){cur=idx;flipped=false;render();}
};
document.getElementById('search-input').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('search-btn').click();});

// filter
document.querySelectorAll('.filter-btn').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    buildDeck(b.dataset.f);
  };
});

// keyboard
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown'){cur=(cur+1)%deck.length;flipped=false;render();}
  else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){cur=(cur-1+deck.length)%deck.length;flipped=false;render();}
  else if(e.key===' '){e.preventDefault();flipped=!flipped;render();}
});

// swipe
let tx=0;
const sc=document.getElementById('scene');
sc.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;},{passive:true});
sc.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)>40){
    if(dx<0){cur=(cur+1)%deck.length;}else{cur=(cur-1+deck.length)%deck.length;}
    flipped=false;render();
  }
},{passive:true});

function showWelcome(){
  document.getElementById('welcome').style.display='flex';
  document.getElementById('app').style.display='none';
}
function startNouns(filter){
  document.getElementById('welcome').style.display='none';
  document.getElementById('app').style.display='flex';
  buildDeck(filter||'all');
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.f===(filter||'all')));
}

showWelcome();
