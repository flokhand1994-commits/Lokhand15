const CDN = "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/";
let cur = 0;

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#x27;');
}

function sentBox(label, arr) {
  return `<div class="sent-box">
    <div class="sent-label">${label}</div>
    <p class="sent-nl" lang="nl">${escHtml(arr[0])}</p>
    <div class="sent-trans">
      <p class="sent-en" lang="en">${escHtml(arr[1])}</p>
      <p class="sent-fr" lang="fr">${escHtml(arr[2])}</p>
    </div>
  </div>`;
}

function buildCard(v, i) {
  const imgUrl = CDN + v.ec + '.svg';
  const front = `
    <div class="face front">
      <div class="num">${i+1} / ${VERBS.length}</div>
      <div class="clipart" aria-hidden="true">
        <img class="clipart-img" src="${imgUrl}" alt="" width="96" height="96" decoding="async" loading="lazy"
          onerror="this.style.display='none';var f=this.nextElementSibling;if(f)f.style.display='block'"/>
        <span class="clipart-fallback" style="display:none">${v.emoji}</span>
      </div>
      <div class="lemma" lang="nl">${escHtml(v.nl)}</div>
      <div class="glosses">
        <p class="gloss-line" lang="en"><span class="lang">EN</span> ${escHtml(v.en)}</p>
        <p class="gloss-line" lang="fr"><span class="lang">FR</span> ${escHtml(v.fr)}</p>
      </div>
    </div>`;

  const back = `
    <div class="face back">
      <div class="tense-grid">
        <div class="tense-box vtt">
          <div class="tense-head"><span class="tense-name">Perfectum</span><span class="tense-abbr">VTT</span></div>
          <p class="tense-value">${escHtml(v.vtt)}</p>
          ${v.note ? `<p style="font-size:.75rem;color:var(--muted);font-style:italic;margin:.3rem 0 0">${escHtml(v.note)}</p>` : ''}
        </div>
        <div class="tense-box ovt">
          <div class="tense-head"><span class="tense-name">Imperfectum</span><span class="tense-abbr">OVT</span></div>
          <p class="tense-value">${escHtml(v.ovt)}</p>
        </div>
      </div>
      <div class="sentences">
        <div class="sent-two-col">
          <div class="sent-col sent-col-vtt">
            <div class="sent-col-head">Perfectum (VTT)</div>
            ${sentBox('Enkelvoud', v.s.vtt.sg)}
            ${sentBox('Meervoud', v.s.vtt.pl)}
          </div>
          <div class="sent-col sent-col-ovt">
            <div class="sent-col-head">Imperfectum (OVT)</div>
            ${sentBox('Enkelvoud', v.s.ovt.sg)}
            ${sentBox('Meervoud', v.s.ovt.pl)}
          </div>
        </div>
      </div>
    </div>`;

  return `<div class="slide"${i !== 0 ? ' hidden' : ''} data-index="${i}">
    <div class="card">
      <div class="inner" onclick="this.classList.toggle('flipped')">${front}${back}</div>
    </div>
  </div>`;
}

const viewer = document.getElementById('viewer');
viewer.innerHTML = VERBS.map((v, i) => buildCard(v, i)).join('');

const slides = viewer.querySelectorAll('.slide');

function goTo(idx) {
  slides[cur].hidden = true;
  slides[cur].querySelector('.inner').classList.remove('flipped');
  cur = (idx + VERBS.length) % VERBS.length;
  slides[cur].hidden = false;
  document.getElementById('counter').textContent = `${cur+1} / ${VERBS.length}`;
}

document.getElementById('prev-btn').onclick = () => goTo(cur - 1);
document.getElementById('next-btn').onclick = () => goTo(cur + 1);

document.getElementById('goto-btn').onclick = () => {
  const v = parseInt(document.getElementById('goto-input').value);
  if (v >= 1 && v <= VERBS.length) goTo(v - 1);
};
document.getElementById('goto-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('goto-btn').click();
});

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo(cur + 1);
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goTo(cur - 1);
  else if (e.key === ' ') { e.preventDefault(); slides[cur].querySelector('.inner').classList.toggle('flipped'); }
});

let tx = 0;
viewer.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
viewer.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 40) goTo(dx < 0 ? cur + 1 : cur - 1);
}, { passive: true });
</script>
