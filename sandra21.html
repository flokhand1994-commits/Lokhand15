<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sandra 2.1 – Irreguliere Verba</title>
<style>
:root{--bg:#f4f7fb;--ink:#1a2b3c;--muted:#5a6b7c;--accent:#2c6aa0;--card:#fff;--border:#c8d8e8;--green:#2a7a6a}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:12px;-webkit-tap-highlight-color:transparent}

/* App header */
.app-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;width:min(460px,96vw)}
#home-btn{padding:5px 14px;border:1.5px solid var(--border);border-radius:20px;background:var(--card);color:var(--muted);font-size:.82rem;cursor:pointer;white-space:nowrap;touch-action:manipulation}
#home-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.app-title{font-size:1rem;color:var(--accent);font-weight:700}

/* Card scene */
#scene{width:min(460px,96vw);height:280px;perspective:1000px;cursor:pointer;touch-action:pan-y;margin-bottom:14px}
.inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .55s ease}
.inner.flipped{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:14px;background:var(--card);border:1.5px solid var(--border);box-shadow:0 2px 14px rgba(0,0,0,.09);padding:24px 26px;display:flex;flex-direction:column;justify-content:center;user-select:none;-webkit-user-select:none}
.back-face{transform:rotateY(180deg)}

/* Front face */
.card-num{font-size:.72rem;color:var(--muted);margin-bottom:8px}
.verb-lemma{font-size:2.6rem;font-weight:800;color:var(--accent);margin-bottom:10px;line-height:1.1}
.verb-gloss{font-size:.92rem;color:var(--muted);line-height:1.6}
.flip-hint{margin-top:12px;font-size:.7rem;color:#aab;text-align:center}

/* Back face */
.perfectum-label{font-size:.72rem;font-weight:700;letter-spacing:.8px;color:var(--muted);text-transform:uppercase;margin-bottom:10px}
.perfectum-value{font-size:2rem;font-weight:800;color:var(--green);line-height:1.2;margin-bottom:8px}
.perfectum-note{font-size:.8rem;color:var(--muted);font-style:italic;margin-top:4px}

/* Toolbar */
#toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:8px;width:min(460px,96vw)}
.nav-btn{padding:7px 16px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);color:var(--accent);font-size:.9rem;cursor:pointer;font-weight:700;touch-action:manipulation;min-height:44px}
.nav-btn:hover{background:var(--accent);color:#fff}
#counter{font-size:.88rem;color:var(--muted);min-width:60px;text-align:center}
#goto-input{width:52px;padding:6px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:.85rem;text-align:center}
.go-btn{padding:6px 12px;border:1.5px solid var(--accent);border-radius:6px;background:var(--accent);color:#fff;font-size:.82rem;cursor:pointer}

.byline{position:fixed;bottom:10px;right:14px;font-size:.65rem;color:var(--muted);opacity:.55;pointer-events:none}
</style>
</head>
<body>

<div class="app-header">
  <button id="home-btn" onclick="window.location='index.html'">← Home</button>
  <span class="app-title">📝 Sandra 2.1 – Irreguliere Verba</span>
</div>

<div id="toolbar">
  <button class="nav-btn" id="prev-btn">&#9664;</button>
  <span id="counter">1 / 55</span>
  <button class="nav-btn" id="next-btn">&#9654;</button>
  <input id="goto-input" type="number" min="1" max="55" placeholder="#">
  <button class="go-btn" id="goto-btn">Go</button>
</div>

<div id="scene">
  <div class="inner" id="inner">
    <div class="face front-face" id="front"></div>
    <div class="face back-face"  id="back"></div>
  </div>
</div>

<p class="byline">by Fatima Lokhandwala</p>

<script>
const VERBS = [
  // [infinitive, EN gloss, FR gloss, perfectum display, note]
  ["aandoen",      "to put on",                  "mettre",                       "heeft/hebben aangedaan",   ""],
  ["aankomen",     "to arrive",                  "arriver",                      "is/zijn aangekomen",       ""],
  ["afwassen",     "to wash up",                 "faire la vaisselle",           "heeft/hebben afgewassen",  ""],
  ["bakken",       "to bake / fry",              "faire cuire",                  "heeft/hebben gebakken",    ""],
  ["beginnen",     "to begin",                   "commencer",                    "is/zijn begonnen",         ""],
  ["begrijpen",    "to understand",              "comprendre",                   "heeft/hebben begrepen",    ""],
  ["bezoeken",     "to visit",                   "visiter",                      "heeft/hebben bezocht",     ""],
  ["blijven",      "to stay",                    "rester",                       "is/zijn gebleven",         ""],
  ["brengen",      "to bring",                   "apporter",                     "heeft/hebben gebracht",    ""],
  ["denken",       "to think",                   "penser",                       "heeft/hebben gedacht",     ""],
  ["doen",         "to do",                      "faire",                        "heeft/hebben gedaan",      ""],
  ["dragen",       "to carry / wear",            "porter",                       "heeft/hebben gedragen",    ""],
  ["drinken",      "to drink",                   "boire",                        "heeft/hebben gedronken",   ""],
  ["eten",         "to eat",                     "manger",                       "heeft/hebben gegeten",     ""],
  ["gaan",         "to go",                      "aller",                        "is/zijn gegaan",           ""],
  ["geven",        "to give",                    "donner",                       "heeft/hebben gegeven",     ""],
  ["hebben",       "to have",                    "avoir",                        "heeft/hebben gehad",       ""],
  ["helpen",       "to help",                    "aider",                        "heeft/hebben geholpen",    ""],
  ["kiezen",       "to choose",                  "choisir",                      "heeft/hebben gekozen",     ""],
  ["kijken (naar)","to look (at)",               "regarder",                     "heeft/hebben gekeken",     ""],
  ["komen",        "to come",                    "venir",                        "is/zijn gekomen",          ""],
  ["kopen",        "to buy",                     "acheter",                      "heeft/hebben gekocht",     ""],
  ["krijgen",      "to receive / get",           "recevoir",                     "heeft/hebben gekregen",    ""],
  ["lezen",        "to read",                    "lire",                         "heeft/hebben gelezen",     ""],
  ["liggen",       "to lie",                     "être allongé(e)",              "heeft/hebben gelegen",     ""],
  ["lopen",        "to walk / run",              "marcher / courir",             "heeft/hebben gelopen",     "(zijn) gelopen naar … (bestemming)"],
  ["nemen",        "to take",                    "prendre",                      "heeft/hebben genomen",     ""],
  ["ontbijten",    "to have breakfast",          "prendre le petit-déjeuner",   "heeft/hebben ontbeten",    ""],
  ["opstaan",      "to get up",                  "se lever",                     "is/zijn opgestaan",        ""],
  ["rijden",       "to drive / ride",            "conduire / rouler",            "heeft/hebben gereden",     "(zijn) gereden naar … (bestemming)"],
  ["roepen",       "to call / shout",            "appeler / crier",              "heeft/hebben geroepen",    ""],
  ["scheiden",     "to separate / divorce",      "se séparer",                   "is/zijn gescheiden",       ""],
  ["schrijven",    "to write",                   "écrire",                       "heeft/hebben geschreven",  ""],
  ["slapen",       "to sleep",                   "dormir",                       "heeft/hebben geslapen",    ""],
  ["sluiten",      "to close",                   "fermer",                       "heeft/hebben gesloten",    ""],
  ["snijden",      "to cut",                     "couper",                       "heeft/hebben gesneden",    ""],
  ["spreken",      "to speak",                   "parler",                       "heeft/hebben gesproken",   ""],
  ["strijken",     "to iron",                    "repasser",                     "heeft/hebben gestreken",   ""],
  ["uitdoen",      "to take off (clothing)",     "enlever",                      "heeft/hebben uitgedaan",   ""],
  ["vallen",       "to fall",                    "tomber",                       "is/zijn gevallen",         ""],
  ["vergeten",     "to forget",                  "oublier",                      "heeft/hebben vergeten",    "(zijn) vergeten — persoon / idee"],
  ["verkopen",     "to sell",                    "vendre",                       "heeft/hebben verkocht",    ""],
  ["verliezen",    "to lose",                    "perdre",                       "heeft/hebben verloren",    ""],
  ["vertrekken",   "to leave / depart",          "partir",                       "is/zijn vertrokken",       ""],
  ["vinden",       "to find",                    "trouver",                      "heeft/hebben gevonden",    ""],
  ["wassen",       "to wash",                    "laver",                        "heeft/hebben gewassen",    ""],
  ["weten",        "to know",                    "savoir",                       "heeft/hebben geweten",     ""],
  ["winnen",       "to win",                     "gagner",                       "heeft/hebben gewonnen",    ""],
  ["worden",       "to become",                  "devenir",                      "is/zijn geworden",         ""],
  ["zien",         "to see",                     "voir",                         "heeft/hebben gezien",      ""],
  ["zijn",         "to be",                      "être",                         "is/zijn geweest",          ""],
  ["zingen",       "to sing",                    "chanter",                      "heeft/hebben gezongen",    ""],
  ["zitten",       "to sit",                     "être assis(e)",                "heeft/hebben gezeten",     ""],
  ["zoeken",       "to look for",                "chercher",                     "heeft/hebben gezocht",     ""],
  ["zwemmen",      "to swim",                    "nager",                        "heeft/hebben gezwommen",   ""],
];

let cur = 0, flipped = false;

function render() {
  const v = VERBS[cur];
  const inner = document.getElementById('inner');
  inner.classList.toggle('flipped', flipped);

  document.getElementById('front').innerHTML =
    `<div class="card-num">${cur + 1} / ${VERBS.length}</div>
     <div class="verb-lemma">${v[0]}</div>
     <div class="verb-gloss">🇬🇧 ${v[1]}</div>
     <div class="verb-gloss">🇫🇷 ${v[2]}</div>
     <div class="flip-hint">tik om te draaien · tap to flip</div>`;

  document.getElementById('back').innerHTML =
    `<div class="perfectum-label">Perfectum (VTT)</div>
     <div class="perfectum-value">${v[3]}</div>
     ${v[4] ? `<div class="perfectum-note">${v[4]}</div>` : ''}`;

  document.getElementById('counter').textContent = `${cur + 1} / ${VERBS.length}`;
}

document.getElementById('prev-btn').onclick = () => { cur = (cur - 1 + VERBS.length) % VERBS.length; flipped = false; render(); };
document.getElementById('next-btn').onclick = () => { cur = (cur + 1) % VERBS.length; flipped = false; render(); };
document.getElementById('scene').onclick    = () => { flipped = !flipped; render(); };

document.getElementById('goto-btn').onclick = () => {
  const v = parseInt(document.getElementById('goto-input').value);
  if (v >= 1 && v <= VERBS.length) { cur = v - 1; flipped = false; render(); }
};
document.getElementById('goto-input').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('goto-btn').click(); });

// keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { cur = (cur + 1) % VERBS.length; flipped = false; render(); }
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { cur = (cur - 1 + VERBS.length) % VERBS.length; flipped = false; render(); }
  else if (e.key === ' ') { e.preventDefault(); flipped = !flipped; render(); }
});

// swipe
let tx = 0;
const sc = document.getElementById('scene');
sc.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
sc.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 40) {
    cur = dx < 0 ? (cur + 1) % VERBS.length : (cur - 1 + VERBS.length) % VERBS.length;
    flipped = false; render();
  }
}, { passive: true });

render();
</script>
</body>
</html>
